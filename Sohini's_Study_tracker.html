<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.1);
            --primary: #818cf8;
            --exam: #fb7185;
            --assign: #38bdf8;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(45deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(15, 23, 42, 0.6);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 20px; min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; overflow-x: hidden;
        }

        /* --- BACKGROUND GRAPHICS --- */
        .shape {
            position: fixed; border-radius: 50%; filter: blur(40px); z-index: -1;
            animation: float 20s infinite alternate; opacity: 0.6;
        }
        .s1 { width: 300px; height: 300px; background: #818cf8; top: -50px; left: -50px; }
        .s2 { width: 400px; height: 400px; background: #fb7185; bottom: -100px; right: -50px; animation-delay: -5s; }
        .s3 { width: 200px; height: 200px; background: #38bdf8; top: 40%; right: 10%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(100px, 50px) rotate(90deg); }
        }

        /* --- GLASS PANEL --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px; padding: 30px; width: 100%; max-width: 850px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .chart-box { width: 180px; height: 180px; margin: 0 auto; }

        input, select, button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 12px; border-radius: 12px; outline: none; margin: 5px;
        }
        .add-btn { background: var(--primary); cursor: pointer; border: none; font-weight: bold; }
        #theme-toggle { cursor: pointer; font-size: 0.9rem; }

        /* --- TASK LAYOUT --- */
        .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card {
            background: var(--card-bg); padding: 15px; border-radius: 15px;
            border-left: 6px solid #fff; display: flex; justify-content: space-between; align-items: center;
        }
        .Assignment { border-left-color: var(--assign); }
        .Exam { border-left-color: var(--exam); }
        .done { opacity: 0.4; text-decoration: line-through; }

        /* --- POPUP --- */
        #popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #1e293b; padding: 25px; border-radius: 20px; 
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 10;
        }
    </style>
</head>
<body data-theme="light">

    <!-- Floating Graphics -->
    <div class="shape s1"></div>
    <div class="shape s2"></div>
    <div class="shape s3"></div>

    <div class="glass-panel">
        <div class="header">
            <h1>📊 Study Tracker</h1>
            <button id="theme-toggle" onclick="toggleTheme()">🌓 Mode</button>
        </div>

        <div class="chart-box"><canvas id="pChart"></canvas></div>

        <div style="display:flex; flex-wrap:wrap; gap:5px; margin:20px 0; justify-content:center;">
            <input type="text" id="tName" placeholder="Task Name...">
            <input type="date" id="tDate">
            <select id="tCat">
                <option value="Assignment">Assignment</option>
                <option value="Exam">Exam Prep</option>
            </select>
            <button class="add-btn" onclick="addTask()">Add Task</button>
        </div>

        <div class="task-grid">
            <div><h3 style="color:var(--assign)">📝 Assignments</h3><div id="aList"></div></div>
            <div><h3 style="color:var(--exam)">⏳ Exams</h3><div id="eList"></div></div>
        </div>
    </div>

    <div id="popup">
        <h2 id="qText"></h2>
        <button onclick="closeQ()" style="background:#10b981; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Keep Going!</button>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('studyDB')) || [];
        const quotes = ["Great job!", "Small steps, big results!", "One step closer!", "You're on fire!"];

        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('studyTheme', theme);
        }

        // Apply saved theme
        document.body.setAttribute('data-theme', localStorage.getItem('studyTheme') || 'light');

        function addTask() {
            const name = document.getElementById('tName').value;
            const date = document.getElementById('tDate').value;
            const cat = document.getElementById('tCat').value;
            if(!name || !date) return alert("Fill in details!");
            
            tasks.push({ id: Date.now(), name, date, cat, done: false });
            save();
            document.getElementById('tName').value = '';
        }

        function toggleTask(id) {
            const t = tasks.find(x => x.id === id);
            if(!t.done) {
                document.getElementById('qText').innerText = quotes[Math.floor(Math.random()*quotes.length)];
                document.getElementById('popup').style.display = 'block';
            }
            t.done = !t.done;
            save();
        }

        function deleteTask(id) { tasks = tasks.filter(x => x.id !== id); save(); }
        function closeQ() { document.getElementById('popup').style.display = 'none'; }
        function save() { localStorage.setItem('studyDB', JSON.stringify(tasks)); render(); }

        function render() {
            const aDiv = document.getElementById('aList');
            const eDiv = document.getElementById('eList');
            aDiv.innerHTML = ''; eDiv.innerHTML = '';

            tasks.forEach(t => {
                const card = `<div class="card ${t.cat} ${t.done ? 'done' : ''}">
                    <div><strong>${t.name}</strong><br><small>📅 ${t.date}</small></div>
                    <div>
                        <button onclick="toggleTask(${t.id})" style="background:none; border:none; font-size:20px; cursor:pointer;">${t.done ? '↩️' : '✅'}</button>
                        <button onclick="deleteTask(${t.id})" style="background:none; border:none; color:#ff4d4d; cursor:pointer;">✕</button>
                    </div>
                </div>`;
                t.cat === 'Assignment' ? aDiv.innerHTML += card : eDiv.innerHTML += card;
            });
            updateChart();
        }

        let chart;
        function updateChart() {
            const done = tasks.filter(x => x.done).length;
            const pending = tasks.length - done;
            const ctx = document.getElementById('pChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Done', 'Pending'],
                    datasets: [{ data: [done, pending], backgroundColor: ['#10b981', '#ffffff44'], borderWidth: 0 }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        render();
    </script>
</body>
</html>
